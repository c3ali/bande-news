services:
  app:
    build: .
    ports:
      - "${PORT:-3001}:3000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - FLARESOLVERR_URL=http://flaresolverr:8191
    depends_on:
      - flaresolverr

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      - LOG_LEVEL=info
